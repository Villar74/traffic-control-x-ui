<!DOCTYPE html>
<html lang="ru" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-UI Pro Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Включаем поддержку темной темы по классу
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        .hover-trigger .hover-target {
            display: none;
        }

        .hover-trigger:hover .hover-target {
            display: inline-block;
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 h-screen flex flex-col font-sans overflow-hidden transition-colors duration-200">

    <header
        class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 px-6 py-3 flex justify-between items-center shrink-0 z-10 transition-colors duration-200">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <span id="status-dot"
                    class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                Traffic Control
            </h1>

            <div class="flex items-center gap-2 border-l border-slate-200 dark:border-slate-600 pl-4 ml-2">
                <input type="text" id="server-ip" value="127.0.0.1:8000"
                    class="text-sm border border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-700 dark:text-white rounded px-2 py-1 w-40 outline-none focus:border-blue-500 dark:focus:border-blue-400 transition-colors"
                    placeholder="IP:PORT">
                <button onclick="reconnect()"
                    class="text-xs bg-slate-800 dark:bg-slate-600 text-white px-3 py-1.5 rounded hover:bg-slate-700 dark:hover:bg-slate-500 transition-colors">Connect</button>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <label class="text-sm font-medium text-slate-600 dark:text-slate-400">Client:</label>
                <select id="email-filter" onchange="renderAll()"
                    class="border border-slate-200 dark:border-slate-600 rounded px-3 py-1.5 text-sm bg-slate-50 dark:bg-slate-700 dark:text-white outline-none w-48 transition-colors">
                    <option value="">All clients</option>
                </select>
            </div>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="hide-known" onchange="renderAll()" class="sr-only peer">
                <div
                    class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600">
                </div>
                <span
                    class="ml-2 text-sm font-medium text-slate-600 dark:text-slate-400 uppercase text-[10px] tracking-wider">Only Unknown</span>
            </label>
            <button onclick="toggleTheme()"
                class="p-1.5 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors border border-slate-200 dark:border-slate-600"
                title="Переключить тему">
                <svg id="theme-icon-dark" class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <svg id="theme-icon-light" class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-4 gap-4">

        <div
            class="w-[60%] flex flex-col bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden transition-colors duration-200">
            <div
                class="px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 flex justify-between items-center shrink-0">
                <h2 class="font-semibold text-slate-700 dark:text-slate-200">Request flow (<span
                        id="log-count">0</span>)</h2>
                <button onclick="clearLogs()"
                    class="text-xs text-red-500 hover:text-red-600 dark:text-red-400 dark:hover:text-red-300 font-medium">Очистить</button>
            </div>
            <div class="flex-1 overflow-auto p-0">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead
                        class="bg-white dark:bg-slate-800 sticky top-0 shadow-sm z-10 text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider transition-colors duration-200">
                        <tr>
                            <th class="px-4 py-2">Time</th>
                            <th class="px-4 py-2">Client</th>
                            <th class="px-4 py-2">Service</th>
                            <th class="px-4 py-2 w-full">Address (Click = add)</th>
                        </tr>
                    </thead>
                    <tbody id="live-logs" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="w-[40%] flex flex-col gap-4 overflow-hidden">

            <div
                class="flex-1 flex flex-col bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden min-h-[40%] transition-colors duration-200">
                <div
                    class="px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 shrink-0">
                    <h2 class="font-semibold text-slate-700 dark:text-slate-200">Top addresses (Grouped)</h2>
                </div>
                <div class="flex-1 overflow-auto">
                    <table class="w-full text-left text-sm">
                        <thead
                            class="bg-white dark:bg-slate-800 sticky top-0 shadow-sm z-10 text-slate-500 dark:text-slate-400 text-xs uppercase tracking-wider transition-colors duration-200">
                            <tr>
                                <th class="px-4 py-2">Address</th>
                                <th class="px-4 py-2 w-20 text-right">Hits</th>
                            </tr>
                        </thead>
                        <tbody id="grouped-logs" class="divide-y divide-slate-100 dark:divide-slate-700/50">
                        </tbody>
                    </table>
                </div>
            </div>

            <div
                class="flex-1 flex flex-col bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden min-h-[40%] transition-colors duration-200">
                <div
                    class="px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 shrink-0 flex justify-between items-center">
                    <h2 class="font-semibold text-slate-700 dark:text-slate-200">Rules</h2>
                    <button onclick="promptAddRule()"
                        class="text-xs bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-1 rounded border border-blue-200 dark:border-blue-800 hover:bg-blue-100 dark:hover:bg-blue-900/50 transition-colors">+
                        Add</button>
                </div>
                <div class="flex-1 overflow-auto p-4 flex flex-col gap-4 text-sm" id="rules-container">
                </div>
            </div>

        </div>
    </main>

    <script>
        // Инициализация темы
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        let allLogs = [];
        let serverRules = { ignore_domains: [], services: {} };
        let ws = null;

        const els = {
            ipInput: document.getElementById('server-ip'),
            statusDot: document.getElementById('status-dot'),
            emailFilter: document.getElementById('email-filter'),
            liveLogs: document.getElementById('live-logs'),
            groupedLogs: document.getElementById('grouped-logs'),
            rulesContainer: document.getElementById('rules-container'),
            logCount: document.getElementById('log-count')
        };

        function getApiUrl() { return `http://${els.ipInput.value}`; }
        function getWsUrl() { return `ws://${els.ipInput.value}`; }

        async function fetchRules() {
            try {
                const res = await fetch(`${getApiUrl()}/ejwrjbe/dsijfndsjnfds`);
                serverRules = await res.json();
                renderRules();
            } catch (e) { console.error("Error rules", e); }
        }

        async function fetchHistory() {
            try {
                const res = await fetch(`${getApiUrl()}/ejwrjbe/wereujtrwgnb?limit=10000`);
                const json = await res.json();
                if (json.data) {
                    allLogs = json.data.reverse();
                    updateEmailFilterDropdown();
                    renderAll();
                }
            } catch (e) { console.error("Error hisory", e); }
        }

        function connectWS() {
            if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
            if (ws) ws.close();

            ws = new WebSocket(`${getWsUrl()}/ejwrjbe/uhgjnbierbub`);

            ws.onopen = () => {
                els.statusDot.classList.replace('bg-red-500', 'bg-emerald-500');
                els.statusDot.classList.replace('bg-yellow-500', 'bg-emerald-500');
                els.statusDot.style.boxShadow = '0 0 8px rgba(16, 185, 129, 0.8)'; // Зеленое свечение
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                allLogs.unshift(data);
                if (allLogs.length > 3000) allLogs.pop();

                updateEmailFilterDropdown(data.email);

                const currentFilter = els.emailFilter.value;
                if (!currentFilter || currentFilter === data.email) {
                    renderAll();
                }
            };

            ws.onclose = () => {
                els.statusDot.classList.replace('bg-emerald-500', 'bg-yellow-500');
                els.statusDot.style.boxShadow = '0 0 8px rgba(234, 179, 8, 0.8)'; // Желтое свечение
                setTimeout(connectWS, 3000);
            };
        }

        function reconnect() {
            allLogs = [];
            fetchRules().then(fetchHistory).then(connectWS);
        }

        async function saveRulesToServer() {
            await fetch(`${getApiUrl()}/ejwrjbe/dsijfndsjnfds`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(serverRules)
            });
            fetchRules();
            fetchHistory();
        }

        function addServiceRule(destination, serviceName) {
            if (!serviceName) return;
            serverRules.services[destination] = serviceName;
            saveRulesToServer();
        }

        function deleteServiceRule(destination) {
            delete serverRules.services[destination];
            saveRulesToServer();
        }

        function addIgnoreRule(destination) {
            if (!destination) return;
            if (!serverRules.ignore_domains.includes(destination)) {
                serverRules.ignore_domains.push(destination);
                saveRulesToServer();
            }
        }

        function deleteIgnoreRule(destination) {
            serverRules.ignore_domains = serverRules.ignore_domains.filter(d => d !== destination);
            saveRulesToServer();
        }

        function promptRuleFor(destination) {
            const action = prompt(
                `Action с ${destination}?\n\n` +
                `1 - Add service\n` +
                `2 - Ignore\n` +
                `3 - Whois`,
                "1"
            );

            if (action === "1") {
                const name = prompt(`Enter name for:\n${destination}`, "");
                if (name) addServiceRule(destination, name);
            } else if (action === "2") {
                addIgnoreRule(destination);
            } else if (action === "3") {
                // Открываем сервис проверки в новой вкладке
                window.open(`https://check-host.net/ip-info?host=${destination}`, '_blank');
            }
        }

        function promptAddRule() {
            const dest = prompt("Enter IP, or domain part");
            if (dest) promptRuleFor(dest);
        }

        function updateEmailFilterDropdown(newEmail = null) {
            const filter = els.emailFilter;
            const currentSelected = filter.value;

            const emails = new Set(allLogs.map(l => l.email));
            if (newEmail) emails.add(newEmail);

            if (filter.options.length - 1 !== emails.size) {
                filter.innerHTML = '<option value="">All Clients</option>';
                Array.from(emails).sort().forEach(email => {
                    const opt = document.createElement('option');
                    opt.value = email;
                    opt.textContent = email;
                    filter.appendChild(opt);
                });
                filter.value = currentSelected;
            }
        }

        function renderAll() {
            const emailFilter = els.emailFilter.value;
            const hideKnown = document.getElementById('hide-known').checked;

            // Сначала фильтруем по Email
            let filtered = emailFilter ? allLogs.filter(l => l.email === emailFilter) : allLogs;

            // Затем, если включен чекбокс, убираем всё, что имеет имя сервиса
            if (hideKnown) {
                filtered = filtered.filter(l => l.service === "Unknown");
            }

            els.logCount.textContent = filtered.length;

            // Группировка идущих подряд одинаковых логов
            const groupedFlow = [];
            if (filtered.length > 0) {
                let currentGroup = { ...filtered[0], count: 1 };

                for (let i = 1; i < filtered.length; i++) {
                    const log = filtered[i];
                    // Сравниваем email, адрес и сервис
                    if (log.email === currentGroup.email &&
                        log.destination === currentGroup.destination &&
                        log.service === currentGroup.service) {
                        currentGroup.count++;
                    } else {
                        groupedFlow.push(currentGroup);
                        currentGroup = { ...log, count: 1 };
                    }
                }
                groupedFlow.push(currentGroup);
            }

            // Рендерим таблицу
            els.liveLogs.innerHTML = groupedFlow.slice(0, 500).map(log => {
                // Если запросов больше 1, показываем бейдж
                const countBadge = log.count > 1
                    ? `<span class="ml-2 px-1.5 py-0.5 bg-amber-100 text-amber-700 dark:bg-amber-900/40 dark:text-amber-400 rounded-full text-[10px] font-bold border border-amber-200 dark:border-amber-800 animate-pulse">×${log.count}</span>`
                    : '';

                return `
                <tr class="hover:bg-blue-50 dark:hover:bg-slate-700/50 transition-colors group">
                    <td class="px-4 py-1.5 text-slate-500 dark:text-slate-400 text-xs">${log.time.split(' ')[1]}</td>
                    <td class="px-4 py-1.5 font-medium text-slate-700 dark:text-slate-200">${log.email}</td>
                    <td class="px-4 py-1.5">
                        <span class="px-2 py-0.5 ${log.service !== 'Unknown' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/50 dark:text-indigo-300' : 'bg-slate-100 text-slate-500 dark:bg-slate-700 dark:text-slate-400'} rounded-md text-[11px] font-medium border border-transparent dark:border-white/5">
                            ${log.service}
                        </span>
                    </td>
                    <td class="px-4 py-1.5 font-mono text-slate-600 dark:text-slate-300 hover-trigger cursor-pointer flex justify-between items-center" onclick="promptRuleFor('${log.destination}')">
                        <div class="flex items-center truncate">
                            <span class="truncate">${log.destination}<span class="text-slate-400 dark:text-slate-500">:${log.port}</span></span>
                            ${countBadge}
                        </div>
                        <span class="hover-target text-blue-500 dark:text-blue-400 text-xl leading-none ml-2" title="Actions">+</span>
                    </td>
                </tr>
                `;
            }).join('');

            // Группировка для правой панели (Топ адресов) остается без изменений
            const counts = {};
            filtered.forEach(l => { counts[l.destination] = (counts[l.destination] || 0) + 1; });
            const sortedCounts = Object.entries(counts).sort((a, b) => b[1] - a[1]);

            els.groupedLogs.innerHTML = sortedCounts.slice(0, 50).map(([dest, count]) => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50 group cursor-pointer transition-colors" onclick="promptRuleFor('${dest}')">
                    <td class="px-4 py-2 font-mono text-slate-700 dark:text-slate-300 truncate max-w-[200px]" title="${dest}">
                        ${dest}
                    </td>
                    <td class="px-4 py-2 text-right">
                        <span class="bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-2 py-1 rounded-full text-xs font-bold border border-transparent dark:border-slate-600">${count}</span>
                    </td>
                </tr>
            `).join('');
        }

        function editServiceRule(oldKey, oldName) {
            const newName = prompt(`Editing name for ${oldKey}:`, oldName);
            if (newName === null) return; // Отмена

            const newKey = prompt(`Editing address (IP/Домен):`, oldKey);
            if (newKey === null) return; // Отмена

            if (newKey !== oldKey) {
                // Если адрес изменился, удаляем старую запись
                delete serverRules.services[oldKey];
            }

            // Записываем обновленные данные
            serverRules.services[newKey] = newName;

            saveRulesToServer();
        }

        function renderRules() {
            let servicesHtml = `<div><h3 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Known Services</h3><ul class="space-y-1">`;
            for (const [key, val] of Object.entries(serverRules.services)) {
                servicesHtml += `
                    <li class="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 px-2 py-1 rounded border border-slate-100 dark:border-slate-600 transition-colors group">
                        <div class="flex flex-col truncate">
                            <span class="font-medium text-indigo-700 dark:text-indigo-300">${val}</span>
                            <span class="font-mono text-[10px] text-slate-500 dark:text-slate-400 truncate" title="${key}">${key}</span>
                        </div>
                        <div class="flex items-center gap-1">
                            <button onclick="editServiceRule('${key}', '${val}')" class="text-slate-400 hover:text-blue-500 dark:hover:text-blue-400 px-1 text-sm transition-colors" title="Edit">✎</button>
                            <button onclick="deleteServiceRule('${key}')" class="text-slate-400 hover:text-red-500 dark:hover:text-red-400 px-1 text-lg transition-colors">&times;</button>
                        </div>
                    </li>`;
            }
            servicesHtml += `</ul></div>`;

            let ignoreHtml = `<div><h3 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2 mt-4">Ignored</h3><ul class="space-y-1">`;
            serverRules.ignore_domains.forEach(key => {
                ignoreHtml += `
                    <li class="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 px-2 py-1.5 rounded border border-slate-100 dark:border-slate-600 transition-colors">
                        <span class="font-mono text-[11px] text-slate-600 dark:text-slate-300 truncate" title="${key}">${key}</span>
                        <button onclick="deleteIgnoreRule('${key}')" class="text-red-400 dark:text-red-500 hover:text-red-600 dark:hover:text-red-400 px-2 text-lg">&times;</button>
                    </li>`;
            });
            ignoreHtml += `</ul></div>`;

            els.rulesContainer.innerHTML = servicesHtml + ignoreHtml;
        }

        function clearLogs() {
            allLogs = [];
            renderAll();
        }
    </script>
</body>

</html>
